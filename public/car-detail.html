<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết xe - OkXe</title>
    <link rel="stylesheet" href="/car-detail.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>
<body>
    <header class="detail-header">
        <nav class="detail-nav">
            <a href="/" class="detail-logo">Ok<span>Xe</span></a>
            <div class="detail-nav__links">
                <a href="/mua-xe.html">Tìm mua ô tô</a>
                <a href="/khuyen-mai.html">Khuyến mại</a>
                <a href="/tu-van-ban-hang.html">Tư vấn bán hàng</a>
                <a href="/#footer">Liên hệ</a>
            </div>
        </nav>
    </header>

    <main class="detail-page">
        <section class="detail-shell" id="car-detail-root">
            <div class="detail-loading">
                <i class="bx bx-loader-alt bx-spin"></i>
                <span>Đang tải thông tin xe...</span>
            </div>
        </section>
    </main>

    <div class="compare-modal" id="compare-modal" aria-hidden="true">
        <div class="compare-modal__overlay" data-close-compare></div>
        <div class="compare-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="compare-modal-title">
            <div class="compare-modal__header">
                <div>
                    <span>So sánh xe</span>
                    <h2 id="compare-modal-title">Thông số xe đang chọn</h2>
                    <p>Tối đa 3 xe trong mỗi lần so sánh.</p>
                </div>
                <button type="button" class="compare-modal__close" data-close-compare aria-label="Đóng so sánh xe">
                    <i class="bx bx-x" aria-hidden="true"></i>
                </button>
            </div>
            <div class="compare-modal__tools">
                <label class="compare-search">
                    <i class="bx bx-search" aria-hidden="true"></i>
                    <input type="search" id="compare-search-input" placeholder="Tìm xe để thêm vào so sánh">
                </label>
                <p id="compare-count">Đã chọn 0/3 xe</p>
            </div>
            <div class="compare-modal__body">
                <aside class="compare-picker" id="compare-picker" aria-label="Danh sách xe có thể thêm"></aside>
                <section class="compare-table-wrap" id="compare-table-wrap" aria-label="Bảng so sánh thông số xe"></section>
            </div>
        </div>
    </div>

    <script src="/js/car-detail.js"></script>
</body>
</html>
