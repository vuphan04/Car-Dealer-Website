<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tư vấn bán hàng - OkXe</title>
    <meta name="description" content="Danh sách tư vấn bán hàng của OkXe, hỗ trợ khách hàng chọn xe cũ phù hợp và liên hệ nhanh qua điện thoại hoặc email.">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/global/typography.css?v=responsive-font-20260711">
    <link rel="stylesheet" href="/sales-team/style.css?v=responsive-audit-20260711">
    <link rel="stylesheet" href="/global/header.css?v=account-trigger-fix-20260712">
    <link rel="stylesheet" href="/global/responsive-nav.css?v=responsive-audit-20260711">
    <link rel="stylesheet" href="/global/footer.css">
</head>
<body>
    <div data-site-header></div>

    <main>
        <section class="sales-hero" aria-labelledby="sales-title">
            <div class="sales-hero__content">
                <span>Đội ngũ OkXe</span>
                <h1 id="sales-title">Tư vấn bán hàng chuyên nghiệp</h1>
                <p>Chọn đúng người tư vấn để được hỗ trợ rõ nhu cầu, ngân sách, thủ tục và lịch xem xe nhanh gọn.</p>
                <div class="sales-hero__highlights" aria-label="Cam kết của đội ngũ tư vấn OkXe">
                    <span><i class="bx bx-check-shield" aria-hidden="true"></i> Thông tin minh bạch</span>
                    <span><i class="bx bx-car" aria-hidden="true"></i> Am hiểu xe cũ</span>
                    <span><i class="bx bx-support" aria-hidden="true"></i> Hỗ trợ tận tâm</span>
                </div>
            </div>
        </section>

        <section class="sales-toolbar" aria-label="Tìm tư vấn bán hàng">
            <label class="sales-search">
                <i class="bx bx-search" aria-hidden="true"></i>
                <input type="search" id="sales-search-input" placeholder="Tìm theo tên, chức danh, số điện thoại">
            </label>
            <div class="sales-stats" id="sales-stats">
                <span>Đang tải danh sách...</span>
            </div>
        </section>

        <section class="sales-grid" id="sales-grid" aria-label="Danh sách tư vấn bán hàng">
            <article class="sales-empty">
                <i class="bx bx-loader-alt bx-spin" aria-hidden="true"></i>
                <strong>Đang tải đội ngũ tư vấn</strong>
                <p>Vui lòng chờ trong giây lát.</p>
            </article>
        </section>
    </main>

    <div data-site-footer></div>

    <script src="/sales-team/script.js?v=sales-team-polish-20260711"></script>
    <script src="/global/app.js?v=chat-motion-polish-20260712"></script>
    <script src="/global/responsive-nav.js"></script>
</body>
</html>
